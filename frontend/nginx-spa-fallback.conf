# =====================================================
# Nginx config สำหรับ Frontend SPA (เมื่อไม่ใช้ prerender)
# =====================================================
#
# ปัญหา: เมื่อปิด prerender จะไม่มี dist/booking/index.html และ dist/success/index.html
#        ทำให้ /booking และ /success แสดง 404 หรือหน้าผิด
#
# วิธีแก้: ใช้ try_files เพื่อ fallback ไป index.html ให้ React Router จัดการ
#
# =====================================================
# ตัวอย่าง location block สำหรับ frontend (dsmuaythaiticket.com)
# =====================================================

location / {
    root /var/www/dsmuaythaiticket/frontend/dist;
    index index.html;
    try_files $uri $uri/ /index.html;
}

# =====================================================
# วิธีแก้บน VPS:
# 1. sudo nano /etc/nginx/sites-available/dsmuaythaiticket.com
# 2. หา location / ที่ serve frontend
# 3. เพิ่มหรือแก้ให้มี: try_files $uri $uri/ /index.html;
# 4. sudo nginx -t && sudo systemctl restart nginx
# =====================================================
